services:
  windrose:
    build: .
    image: windrose-ds:local
    container_name: windrose
    hostname: windrose
    restart: unless-stopped
    stop_grace_period: 90s
    network_mode: host
    env_file:
      - .env
    environment:
      WINDROSE_APP_ID: ${WINDROSE_APP_ID:-4129620}
      STEAM_LOGIN: ${STEAM_LOGIN:-anonymous}
      STEAM_PASS: ${STEAM_PASS:-}
      WINEDEBUG: -all
      DISPLAY: :99
      PORT: 7777
      QUERYPORT: 7778
    volumes:
      - ./data:/data
      - ./steam-home:/home/steam
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f WindroseServer-Win64-Shipping.exe || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
