services:
  windrose:
    image: ${IMAGE_REPOSITORY:-ghcr.io/uberdudepl/windrose-dedicated-server-docker}:${IMAGE_TAG:-v1.0.1}
    pull_policy: always
    container_name: ${CONTAINER_NAME:-windrose}
    hostname: ${HOSTNAME:-windrose}
    restart: unless-stopped
    stop_grace_period: 90s
    network_mode: host
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      WINDROSE_APP_ID: ${WINDROSE_APP_ID:-4129620}
      STEAM_LOGIN: ${STEAM_LOGIN:-anonymous}
      STEAM_PASS: ${STEAM_PASS:-}
      UPDATE_ON_START: ${UPDATE_ON_START:-true}
      GENERATE_SETTINGS: ${GENERATE_SETTINGS:-true}
      INVITE_CODE: ${INVITE_CODE:-}
      SERVER_NAME: ${SERVER_NAME:-}
      SERVER_NOTE: ${SERVER_NOTE:-}
      SERVER_PASSWORD: ${SERVER_PASSWORD:-}
      MAX_PLAYERS: ${MAX_PLAYERS:-4}
      P2P_PROXY_ADDRESS: ${P2P_PROXY_ADDRESS:-127.0.0.1}
      MULTIHOME: ${MULTIHOME:-0.0.0.0}
      WINEDEBUG: -all
      DISPLAY: :99
      PORT: ${PORT:-7777}
      QUERYPORT: ${QUERYPORT:-7778}
    volumes:
      - ./data:/data
      - ./steam-home:/home/steam
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f WindroseServer-Win64-Shipping.exe || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
